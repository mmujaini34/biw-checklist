<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BIW ITT Installation & Preparation Checklist</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#243447;--slate:#3e556b;--gold:#c79a2b;--bg:#f4f6f8;
  --card:#fff;--line:#d9e0e7;--text:#1f2933;--muted:#64748b;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
body{min-height:100vh}
.shell{width:min(1100px,calc(100% - 24px));margin:20px auto 34px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 42px rgba(15,23,42,.08);overflow:hidden}
.top-banner{background:var(--bg);padding:18px 18px 10px;border-bottom:1px solid var(--line)}
.top-banner img{width:min(100%,900px);height:auto;display:block;margin:0 auto;border-radius:14px}
.hero{padding:18px 22px;background:linear-gradient(135deg,var(--navy) 0%,var(--slate) 100%);color:#fff;border-bottom:3px solid rgba(199,154,43,.55)}
.hero h1{margin:0;font-size:25px;line-height:1.35;letter-spacing:.2px}
.content{padding:18px}
.section{margin-top:16px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}
.section:first-child{margin-top:0}
.section-title{padding:12px 16px;background:linear-gradient(90deg,var(--navy) 0%,var(--slate) 100%);color:#fff;font-weight:700;font-size:18px}
.section-body{padding:16px;background:linear-gradient(180deg,#fff 0%,#fcfdff 100%)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-size:15px;font-weight:700;color:#243447}
.field input[type="text"],.field input[type="date"],.field input[type="datetime-local"],.field select,.field textarea{
  width:100%;min-height:48px;border:1.5px solid #d7dee6;border-radius:13px;
  padding:12px 14px;font-size:15px;background:#fff;color:var(--text);outline:none;
}
.field input[readonly]{background:#f0f3f7;color:#555;cursor:not-allowed;border-color:#c0cad4}
.field textarea{min-height:94px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(199,154,43,.14)}
.timestamp-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#243447,#3e556b);
  color:#fff;border-radius:12px;padding:10px 16px;
  font-size:14px;font-weight:700;letter-spacing:.3px;
  border:2px solid rgba(199,154,43,.5);
}
.timestamp-badge .icon{font-size:18px}
.check-item{margin-top:12px;border:1px solid #e8edf2;border-radius:15px;background:#fff;padding:14px}
.item-title{font-size:15px;font-weight:700;line-height:1.6;margin-bottom:10px;color:#243447}
.options{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:center}
.option{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#334155;background:#f8fafc;border:1px solid #e2e8f0;padding:9px 12px;border-radius:999px}
.option input{accent-color:var(--gold)}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.sub-card{border:1px dashed #d7dee6;border-radius:14px;padding:12px;background:#fbfcfd}
.sub-title{margin-bottom:8px;font-weight:700;color:#243447}
.gate-note{background:#f8fafc;border:1px solid #d9e0e7;border-radius:14px;padding:12px 14px;color:#334155;font-size:14px;line-height:1.6;margin-bottom:12px}
.hidden{display:none!important}
.actions{display:flex;justify-content:center;padding:18px 18px 24px;border-top:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#fafbfd 100%)}
.btn{border:none;border-radius:14px;padding:14px 22px;font-size:16px;font-weight:700;cursor:pointer;min-width:280px;background:linear-gradient(90deg,var(--navy) 0%,var(--slate) 100%);color:#fff;box-shadow:0 10px 24px rgba(36,52,71,.16)}
.btn:disabled{opacity:.65;cursor:wait}
.status{text-align:center;padding:0 20px 22px;min-height:20px;font-size:14px;color:#64748b}
.note{font-size:12px;color:#64748b;margin-top:4px}
.auto-label{font-size:12px;color:var(--gold);font-weight:700;margin-top:3px}
@media(max-width:860px){
  .grid-2,.subgrid{grid-template-columns:1fr}
  .shell{width:min(1100px,calc(100% - 16px))}
  .content{padding:12px}.hero{padding:16px}.hero h1{font-size:22px}.btn{width:100%;min-width:0}
}
</style>
</head>

const VERIFY_OPTIONS  = [{value:'Verified',label:'Verified / تم التحقق'},{value:'Not Verified',label:'Not Verified / لم يتم التحقق'}];
const YES_NO_OPTIONS  = [{value:'Yes',label:'Yes / نعم'},{value:'No',label:'No / لا'}];
const COMPLETED_OPTIONS=[{value:'Completed',label:'Completed / تم إنجازه'},{value:'Not Completed',label:'Not Completed / لم يتم إنجازه'}];

// ============================================================
// أدوات مساعدة
// ============================================================
function setStatus(m){document.getElementById('statusText').textContent=m;}
function setBusy(b){
  const btn=document.getElementById('shareBtn');
  btn.disabled=b;
  btn.textContent=b?'Preparing PDF... / جارٍ التجهيز...':'Generate and Share PDF / إنشاء ومشاركة PDF';
}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function textValue(id){const el=document.getElementById(id);return el?String(el.value||'').trim():'';}
function getRadioValue(name){const c=document.querySelector(`input[name="${name}"]:checked`);return c?c.value:'';}

function normalizeUnitNumber(v){
  let s=String(v||'').trim();
  if(!s)return '';
  const clean=s.replace(/[-_,]+/g,' ').replace(/\s+/g,' ').trim();
  const m=clean.match(/^([RrHh])\s*(\d.*)$/);
  if(!m)return clean.toUpperCase();
  const prefix=m[1].toUpperCase()==='R'?'Rig':'Hoist';
  return `${prefix}-${m[2].trim()}`;
}

// ============================================================
// تنسيق التاريخ والوقت
// ============================================================
function formatDateTime(d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h=d.getHours();
  const ap=h>=12?'PM':'AM';
  h=h%12||12;
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${String(d.getDate()).padStart(2,'0')}-${months[d.getMonth()]}-${d.getFullYear()}  ${h}:${mm}:${ss} ${ap}`;
}

function optionsMarkup(name,opts){
  return opts.map(o=>`<label class="option"><input type="radio" name="${esc(name)}" value="${esc(o.value)}"> ${esc(o.label)}</label>`).join('');
}
function itemMarkup(name,en,ar,opts){
  return `<div class="check-item"><div class="item-title">${esc(en)} / ${esc(ar)}</div><div class="options">${optionsMarkup(name,opts)}</div></div>`;
}

function updatePackerGate(){
  const val=getRadioValue('pkr_gate');
  const sec=document.getElementById('sectionE');
  if(!sec)return;
  if(val==='Packer Included'){sec.classList.remove('hidden');}
  else{sec.classList.add('hidden');}
}

function attachFormatters(){
  const u=document.getElementById('unitNumber');
  if(u){
    u.addEventListener('blur',()=>{u.value=normalizeUnitNumber(u.value);});
  }
}

// ============================================================
// جمع البيانات
// ============================================================
function collectRows(items,prefix){
  return items.map((it,i)=>[it[0], getRadioValue(`${prefix}_${i+1}`)||'—']);
}

function buildSections(pdfCreatedAt){
  const secs=[
    {title:'General Information',rows:[
      ['Engineer Name', textValue('engineerName')||'—'],
      ['Job Date & Time (Page Opened)', document.getElementById('jobDateTime').value||'—'],
      ['Rig or Hoist Number', normalizeUnitNumber(textValue('unitNumber'))||'—'],
      ['Well Number', textValue('wellNumber')||'—'],
      ['Crew Leader', textValue('crewLeader')||'—'],
      ['Company', textValue('company')||'—'],
      ['Client', textValue('client')||'—'],
    ]},
    {title:'A. Pre-mobilization Preparation', rows:collectRows(A_ITEMS,'a')},
    {title:'B. Mobilization', rows:collectRows(B_ITEMS,'b')},
    {title:'C. Preparation', rows:[
      ...collectRows(C_VERIFY,'c'),
      ['Motor Type', textValue('c_motor')||'—'],
      ['Job Preparation Status Reported to FSM', getRadioValue('c_job_ready')||'—'],
    ]},
    {title:'D. PKR', rows:[
      ['Does the Work Include a Packer?', getRadioValue('pkr_gate')||'—'],
    ]},
  ];

  if(getRadioValue('pkr_gate')==='Packer Included'){
    secs.push({title:'E. Packer Penetrator Installation', rows:collectRows(E_ITEMS,'e')});
  }

  secs.push({title:'F. Wellhead Penetrator Installation', rows:collectRows(F_ITEMS,'f')});
  secs.push({title:'G. Bonnet Connection Termination', rows:collectRows(G_ITEMS,'g')});
  secs.push({title:'H. Remarks', rows:[['Remarks', textValue('remarksH')||'—']]});
  secs.push({title:'I. Cable', rows:[
    ['MLE Cable Status', getRadioValue('i_mle_status')||'—'],
    ['MLE Cable Size', textValue('mleCableSize')||'—'],
    ['Main Cable Status', getRadioValue('i_main_status')||'—'],
    ['Main Cable Size', textValue('mainCableSize')||'—'],
  ]});
  secs.push({title:'Report Info', rows:[
    ['Page Opened At', formatDateTime(PAGE_OPEN_TIME)],
    ['PDF Created At', formatDateTime(pdfCreatedAt)],
  ]});

  return secs;
}

// ============================================================
// بناء PDF باستخدام jsPDF
// ============================================================
async function generateAndSharePdf(){
  if(typeof window.jspdf==='undefined'){
    setStatus('jsPDF library not loaded. Please check your internet connection.');
    return;
  }

  setBusy(true);
  setStatus('Building PDF...');

  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const pdfCreatedAt=new Date();
    const sections=buildSections(pdfCreatedAt);

    const pageW=210, pageH=297;
    const mL=14, mR=14, mT=14;
    const usableW=pageW-mL-mR;
    let y=mT;

    // ألوان
    const navyR=36,navyG=52,navyB=71;
    const goldR=199,goldG=154,goldB=43;
    const rowH=8;
    const secTitleH=9;

    function checkPage(needed){
      if(y+needed>pageH-10){doc.addPage();y=mT;}
    }

    function drawSectionTitle(title){
      checkPage(secTitleH+2);
      doc.setFillColor(navyR,navyG,navyB);
      doc.roundedRect(mL,y,usableW,secTitleH,2,2,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(10);
      doc.setFont('helvetica','bold');
      doc.text(title,mL+3,y+6.2);
      y+=secTitleH+2;
      doc.setTextColor(0,0,0);
    }

    function drawRow(label,value,shade){
      const labelW=usableW*0.62;
      const valueW=usableW*0.38;
      const labelX=mL;
      const valueX=mL+labelW;

      // wrap text
      doc.setFontSize(8);
      doc.setFont('helvetica','normal');
      const labelLines=doc.splitTextToSize(String(label),labelW-4);
      const valueLines=doc.splitTextToSize(String(value),valueW-4);
      const lineH=4.2;
      const cellH=Math.max(rowH, Math.max(labelLines.length,valueLines.length)*lineH+3);

      checkPage(cellH+1);

      // خلفية صفوف متبادلة
      if(shade){
        doc.setFillColor(245,247,250);
        doc.rect(mL,y,usableW,cellH,'F');
      }

      // خط فاصل خفيف
      doc.setDrawColor(210,220,230);
      doc.setLineWidth(0.2);
      doc.line(mL,y+cellH,mL+usableW,y+cellH);

      // خط فاصل عمودي
      doc.line(valueX,y,valueX,y+cellH);

      // نص التسمية
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(36,52,71);
      doc.text(labelLines,labelX+2,y+lineH);

      // نص القيمة
      doc.setFont('helvetica','normal');
      doc.setFontSize(8.5);
      // لون حسب القيمة
      if(['Verified','Yes','Completed','Packer Included'].includes(value)){
        doc.setTextColor(22,101,52);
      } else if(['Not Verified','No','Not Completed'].includes(value)){
        doc.setTextColor(153,27,27);
      } else {
        doc.setTextColor(51,65,85);
      }
      doc.text(valueLines,valueX+2,y+lineH);
      doc.setTextColor(0,0,0);

      y+=cellH;
    }

    // ============ Header ============
    doc.setFillColor(navyR,navyG,navyB);
    doc.rect(mL,y,usableW,14,'F');
    doc.setFillColor(goldR,goldG,goldB);
    doc.rect(mL,y+14,usableW,1.5,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(13);
    doc.setFont('helvetica','bold');
    doc.text('BIW ITT Installation and Preparation Checklist',mL+4,y+9.5);
    y+=18;
    doc.setTextColor(0,0,0);

    // ============ تاريخ الفتح والإنشاء ============
    doc.setFillColor(248,250,252);
    doc.roundedRect(mL,y,usableW,10,2,2,'F');
    doc.setDrawColor(goldR,goldG,goldB);
    doc.setLineWidth(0.5);
    doc.roundedRect(mL,y,usableW,10,2,2,'S');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(navyR,navyG,navyB);
    doc.text(`Page Opened: ${formatDateTime(PAGE_OPEN_TIME)}`,mL+3,y+4.5);
    doc.text(`PDF Created: ${formatDateTime(pdfCreatedAt)}`,mL+3,y+8.5);
    y+=13;

    // ============ الأقسام ============
    sections.forEach(sec=>{
      drawSectionTitle(sec.title);
      sec.rows.forEach((row,idx)=>drawRow(row[0],row[1],idx%2===0));
      y+=4;
    });

    // ============ Footer على كل صفحة ============
    const totalPages=doc.getNumberOfPages();
    for(let p=1;p<=totalPages;p++){
      doc.setPage(p);
      doc.setFillColor(navyR,navyG,navyB);
      doc.rect(0,pageH-8,pageW,8,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(7);
      doc.setFont('helvetica','normal');
      doc.text('BIW ITT Checklist — Confidential',mL,pageH-3);
      doc.text(`Page ${p} of ${totalPages}`,pageW-mR-20,pageH-3);
      doc.setTextColor(0,0,0);
    }

    // ============ حفظ / مشاركة ============
    const blob=doc.output('blob');
    const fileName=`BIW_ITT_Checklist_${formatDateTime(pdfCreatedAt).replace(/[\s:]/g,'_').replace(/__+/g,'_')}.pdf`;
    const file=new File([blob],fileName,{type:'application/pdf'});

    const isAndroid=/Android/i.test(navigator.userAgent);

    if(!isAndroid && navigator.share && typeof navigator.canShare==='function' && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'BIW ITT Checklist',text:'BIW ITT Installation Checklist PDF'});
      setStatus('PDF shared successfully. / تمت المشاركة بنجاح.');
    } else {
      // تحميل مباشر
      doc.save(fileName);
      setStatus('PDF downloaded successfully. / تم تحميل PDF بنجاح.');
    }

  } catch(err){
    console.error(err);
    setStatus('Error generating PDF. Please try again. / خطأ في إنشاء PDF.');
  } finally {
    setBusy(false);
  }
}

// ============================================================
// تهيئة
// ============================================================
renderSections();
attachFormatters();
</script>
